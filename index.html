<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idoia Esteban — Diseño de Producción</title>
  <meta name="description" content="Portfolio de diseño de producción cinematográfico de Idoia Esteban.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Darker+Grotesque:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Shared CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loader -->
  <div class="loader" id="loader">
    <span class="loader-text">idoia esteban</span>
  </div>

  <div class="page">

    <!-- Header -->
    <header class="header">
      <div class="header-name" id="headerName">
        <h1 class="title-main">
          <span id="flipText" data-original="idoia esteban" data-alt="diseño de producción">idoia esteban</span>
        </h1>
      </div>
    </header>

    <!-- Poster Windows -->
    <div class="poster-window poster-window-tl">
      <div class="poster-strip" data-s="0">
        <div class="poster-card"><span class="poster-label">peli 1</span></div>
        <div class="poster-card"><span class="poster-label">peli 2</span></div>
        <div class="poster-card"><span class="poster-label">peli 3</span></div>
        <div class="poster-card"><span class="poster-label">peli 4</span></div>
        <div class="poster-card"><span class="poster-label">peli 5</span></div>
        <div class="poster-card"><span class="poster-label">peli 6</span></div>
      </div>
    </div>
    <div class="poster-window poster-window-tr">
      <div class="poster-strip" data-s="1">
        <div class="poster-card"><span class="poster-label">peli 7</span></div>
        <div class="poster-card"><span class="poster-label">peli 8</span></div>
        <div class="poster-card"><span class="poster-label">peli 9</span></div>
        <div class="poster-card"><span class="poster-label">peli 10</span></div>
        <div class="poster-card"><span class="poster-label">peli 11</span></div>
        <div class="poster-card"><span class="poster-label">peli 12</span></div>
      </div>
    </div>
    <div class="poster-window poster-window-bl">
      <div class="poster-strip" data-s="2">
        <div class="poster-card"><span class="poster-label">peli 13</span></div>
        <div class="poster-card"><span class="poster-label">peli 14</span></div>
        <div class="poster-card"><span class="poster-label">peli 15</span></div>
        <div class="poster-card"><span class="poster-label">peli 16</span></div>
        <div class="poster-card"><span class="poster-label">peli 17</span></div>
        <div class="poster-card"><span class="poster-label">peli 18</span></div>
      </div>
    </div>
    <div class="poster-window poster-window-br">
      <div class="poster-strip" data-s="3">
        <div class="poster-card"><span class="poster-label">peli 19</span></div>
        <div class="poster-card"><span class="poster-label">peli 20</span></div>
        <div class="poster-card"><span class="poster-label">peli 21</span></div>
        <div class="poster-card"><span class="poster-label">peli 22</span></div>
        <div class="poster-card"><span class="poster-label">peli 23</span></div>
        <div class="poster-card"><span class="poster-label">peli 24</span></div>
      </div>
    </div>

    <!-- Nav Arrows -->
    <button class="nav-arrow nav-arrow-left" aria-label="Anterior">&#8249;</button>
    <button class="nav-arrow nav-arrow-right" aria-label="Siguiente">&#8250;</button>

    <!-- Center Circle -->
    <div class="circle-area">

      <!-- Submenu (appears at 12 o'clock) -->
      <div class="submenu-container">
        <div class="submenu-overlay" id="submenuPanel"></div>
      </div>

      <!-- Circle border -->
      <div class="circle-border"></div>

      <!-- SVG with CLOCKWISE path for menu text -->
      <svg class="menu-ring-svg" id="menuSvg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!--
            CLOCKWISE arc starting at 9 o'clock (left).
            On this path:
              0%  = 9 o'clock (left)
              25% = 12 o'clock (top)    ← this is our target
              50% = 3 o'clock (right)
              75% = 6 o'clock (bottom)
          -->
          <path id="tp"
            d="M 300,300 m -270,0 a 270,270 0 1,1 540,0 a 270,270 0 1,1 -540,0"
            fill="none" />
        </defs>

        <!-- Menu items group (rotates) -->
        <g id="menuGroup">
          <!-- Items are built dynamically by main.js -->
          <!-- Fallback static items in case JS hasn't loaded -->
          <text><textPath href="#tp" startOffset="2%" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:3px;fill:#1a5c2a;cursor:pointer" data-menu="películas" data-idx="0">PELÍCULAS</textPath></text>
          <text><textPath href="#tp" startOffset="20%" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:3px;fill:#1a5c2a;cursor:pointer" data-menu="contacto" data-idx="1">CONTACTO</textPath></text>
          <text><textPath href="#tp" startOffset="38%" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:3px;fill:#1a5c2a;cursor:pointer" data-menu="trabajos" data-idx="2">TRABAJOS</textPath></text>
          <text><textPath href="#tp" startOffset="56%" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:3px;fill:#1a5c2a;cursor:pointer" data-menu="sobre mí" data-idx="3">SOBRE MÍ</textPath></text>
          <text><textPath href="#tp" startOffset="74%" style="font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:3px;fill:#1a5c2a;cursor:pointer" data-menu="proceso" data-idx="4">PROCESO</textPath></text>
        </g>
      </svg>

      <!-- Before/After viewer -->
      <div class="ba-viewer">
        <div class="ba-slide active">
          <div class="ba-placeholder">
            <div class="ba-label">antes</div>
            <div class="ba-title">Espacio Original</div>
            <svg width="44" height="44" viewBox="0 0 60 60" style="margin-top:8px;opacity:.18">
              <rect x="5" y="15" width="50" height="35" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <line x1="5" y1="40" x2="25" y2="25" stroke="currentColor" stroke-width="1"/>
              <circle cx="42" cy="22" r="5" fill="none" stroke="currentColor" stroke-width="1"/>
            </svg>
          </div>
        </div>
        <div class="ba-slide">
          <div class="ba-placeholder">
            <div class="ba-label">después</div>
            <div class="ba-title">Espacio Transformado</div>
            <svg width="44" height="44" viewBox="0 0 60 60" style="margin-top:8px;opacity:.18">
              <rect x="5" y="15" width="50" height="35" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <rect x="10" y="20" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1"/>
              <rect x="32" y="30" width="18" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1"/>
            </svg>
          </div>
        </div>
      </div>

    </div>

  </div>

  <!-- Shared JS -->
  <script src="js/main.js"></script>

</body>
</html>
