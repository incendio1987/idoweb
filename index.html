<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idoia Esteban — Diseño de Producción</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Darker+Grotesque:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #e8efe6;
      --color-bg-alt: #dce8d9;
      --color-primary: #1a5c2a;
      --color-primary-light: #2a7a3a;
      --color-primary-dark: #0e3d1a;
      --color-accent: #3da355;
      --color-text: #1a5c2a;
      --color-text-light: #3a7a4a;
      --color-border: #1a5c2a;
      --color-white: #f5faf3;
      --font-display: 'Darker Grotesque', sans-serif;
      --font-body: 'DM Mono', monospace;
      --font-mono: 'DM Mono', monospace;
      --radius-card: 16px;
      --border-width: 2px;
      --transition-smooth: 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      --poster-w: 105px;
      --poster-h: 150px;
      --side-margin: 28px;
      --circle-size: min(460px, 46vw);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px}
    body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text);height:100vh;overflow:hidden}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:0.35}
    .loader{position:fixed;inset:0;background:var(--color-primary-dark);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.8s,visibility 0.8s}
    .loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .loader-text{font-family:var(--font-display);font-size:2.5rem;font-weight:800;color:var(--color-white);animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
    .page{width:100vw;height:100vh;position:relative;display:flex;align-items:center;justify-content:center}
    .header{position:absolute;top:clamp(22px,4.5vh,55px);left:50%;transform:translateX(-50%);text-align:center;z-index:10}
    .header-name{display:inline-block;cursor:pointer}
    .title-main{font-family:var(--font-display);font-size:clamp(2.8rem,6.5vw,5.5rem);font-weight:800;letter-spacing:.01em;color:var(--color-primary);line-height:1;text-transform:lowercase}
    .char{display:inline-block;perspective:400px}
    .char.flipping{animation:flipChar .3s ease-in-out}
    @keyframes flipChar{0%{transform:rotateX(0);opacity:1}45%{transform:rotateX(90deg);opacity:0}55%{transform:rotateX(-90deg);opacity:0}100%{transform:rotateX(0);opacity:1}}
    .poster-window{position:absolute;width:var(--poster-w);height:var(--poster-h);border:var(--border-width) solid var(--color-border);border-radius:var(--radius-card);overflow:hidden;z-index:5;background:var(--color-bg)}
    .poster-window-tl{top:clamp(18px,3.5vh,50px);left:var(--side-margin)}
    .poster-window-tr{top:clamp(18px,3.5vh,50px);right:var(--side-margin)}
    .poster-window-bl{bottom:clamp(18px,3.5vh,50px);left:var(--side-margin)}
    .poster-window-br{bottom:clamp(18px,3.5vh,50px);right:var(--side-margin)}
    .poster-strip{display:flex;flex-direction:row;gap:0;width:max-content;animation:scrollH 50s linear infinite}
    .poster-window-tr .poster-strip{animation-delay:-9s}
    .poster-window-bl .poster-strip{animation-delay:-18s}
    .poster-window-br .poster-strip{animation-delay:-27s}
    @keyframes scrollH{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .poster-card{width:var(--poster-w);height:var(--poster-h);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--color-bg-alt);cursor:pointer;transition:background var(--transition-smooth);position:relative}
    .poster-card:hover{background:var(--color-primary)}
    .poster-card:hover .poster-label{color:var(--color-white)}
    .poster-label{font-family:var(--font-mono);font-size:.5rem;text-transform:lowercase;letter-spacing:.06em;text-align:center;color:var(--color-primary);padding:8px;line-height:1.6;transition:color var(--transition-smooth)}
    .circle-area{position:relative;width:var(--circle-size);height:var(--circle-size)}
    .circle-border{position:absolute;inset:0;border-radius:50%;border:1.2px solid var(--color-border);pointer-events:none}
    .menu-ring-svg{position:absolute;top:-42px;left:-42px;width:calc(100% + 84px);height:calc(100% + 84px);overflow:visible}
    .menu-text{font-family:var(--font-mono);font-size:12px;font-weight:500;fill:var(--color-primary);letter-spacing:2.5px;cursor:pointer;text-transform:lowercase}
    .ba-viewer{position:absolute;top:2%;left:2%;width:96%;height:96%;border-radius:50%;overflow:hidden;background:var(--color-bg-alt)}
    .ba-slide{position:absolute;inset:0;opacity:0;transition:opacity 2s ease-in-out;display:flex;align-items:center;justify-content:center}
    .ba-slide.active{opacity:1}
    .ba-placeholder{text-align:center;padding:1.5rem}
    .ba-label{font-family:var(--font-mono);font-size:.5rem;text-transform:lowercase;letter-spacing:.2em;color:var(--color-text-light);margin-bottom:.2rem}
    .ba-title{font-family:var(--font-display);font-size:clamp(1rem,2vw,1.4rem);font-weight:700;color:var(--color-primary)}
    .nav-arrow{position:absolute;top:50%;transform:translateY(-50%);font-size:clamp(2.2rem,3.8vw,3.2rem);font-weight:300;color:var(--color-primary);z-index:5;transition:transform var(--transition-smooth),color var(--transition-smooth);user-select:none;line-height:1}
    .nav-arrow:hover{color:var(--color-accent)}
    .nav-arrow-left{left:calc(var(--side-margin) + var(--poster-w) + 25px)}
    .nav-arrow-left:hover{transform:translateY(-50%) translateX(-4px)}
    .nav-arrow-right{right:calc(var(--side-margin) + var(--poster-w) + 25px)}
    .nav-arrow-right:hover{transform:translateY(-50%) translateX(4px)}
    .submenu-container{position:absolute;top:-52px;left:50%;transform:translateX(-50%);z-index:50}
    .submenu-overlay{background:var(--color-primary);color:var(--color-white);border-radius:14px;padding:0;max-height:0;overflow:hidden;opacity:0;transition:max-height .5s cubic-bezier(.25,.46,.45,.94),opacity .4s,padding .4s;min-width:170px;box-shadow:0 10px 40px rgba(0,0,0,.15);pointer-events:none}
    .submenu-overlay.open{max-height:300px;opacity:1;padding:12px 0;pointer-events:auto}
    .submenu-overlay a{display:block;padding:8px 20px;font-family:var(--font-mono);font-size:.7rem;letter-spacing:.05em;transition:background .2s;text-transform:lowercase}
    .submenu-overlay a:hover{background:var(--color-primary-light)}
    @media(max-width:1000px){:root{--poster-w:80px;--poster-h:115px;--side-margin:16px;--circle-size:min(360px,48vw)}.menu-ring-svg{top:-32px;left:-32px;width:calc(100% + 64px);height:calc(100% + 64px)}.nav-arrow-left{left:calc(var(--side-margin) + var(--poster-w) + 12px)}.nav-arrow-right{right:calc(var(--side-margin) + var(--poster-w) + 12px)}}
    @media(max-width:700px){:root{--poster-w:58px;--poster-h:84px;--side-margin:8px;--circle-size:min(260px,58vw)}.menu-ring-svg{top:-24px;left:-24px;width:calc(100% + 48px);height:calc(100% + 48px)}.menu-text{font-size:9px;letter-spacing:1.5px}.nav-arrow{font-size:1.8rem}.nav-arrow-left{left:calc(var(--side-margin) + var(--poster-w) + 6px)}.nav-arrow-right{right:calc(var(--side-margin) + var(--poster-w) + 6px)}}
  </style>
</head>
<body>
  <div class="loader" id="loader"><span class="loader-text">idoia esteban</span></div>
  <div class="page">
    <header class="header">
      <div class="header-name" id="headerName">
        <h1 class="title-main"><span id="flipText">idoia esteban</span></h1>
      </div>
    </header>
    <div class="poster-window poster-window-tl"><div class="poster-strip" data-s="0">
      <div class="poster-card"><span class="poster-label">peli 1</span></div>
      <div class="poster-card"><span class="poster-label">peli 2</span></div>
      <div class="poster-card"><span class="poster-label">peli 3</span></div>
      <div class="poster-card"><span class="poster-label">peli 4</span></div>
      <div class="poster-card"><span class="poster-label">peli 5</span></div>
      <div class="poster-card"><span class="poster-label">peli 6</span></div>
    </div></div>
    <div class="poster-window poster-window-tr"><div class="poster-strip" data-s="1">
      <div class="poster-card"><span class="poster-label">peli 7</span></div>
      <div class="poster-card"><span class="poster-label">peli 8</span></div>
      <div class="poster-card"><span class="poster-label">peli 9</span></div>
      <div class="poster-card"><span class="poster-label">peli 10</span></div>
      <div class="poster-card"><span class="poster-label">peli 11</span></div>
      <div class="poster-card"><span class="poster-label">peli 12</span></div>
    </div></div>
    <div class="poster-window poster-window-bl"><div class="poster-strip" data-s="2">
      <div class="poster-card"><span class="poster-label">peli 13</span></div>
      <div class="poster-card"><span class="poster-label">peli 14</span></div>
      <div class="poster-card"><span class="poster-label">peli 15</span></div>
      <div class="poster-card"><span class="poster-label">peli 16</span></div>
      <div class="poster-card"><span class="poster-label">peli 17</span></div>
      <div class="poster-card"><span class="poster-label">peli 18</span></div>
    </div></div>
    <div class="poster-window poster-window-br"><div class="poster-strip" data-s="3">
      <div class="poster-card"><span class="poster-label">peli 19</span></div>
      <div class="poster-card"><span class="poster-label">peli 20</span></div>
      <div class="poster-card"><span class="poster-label">peli 21</span></div>
      <div class="poster-card"><span class="poster-label">peli 22</span></div>
      <div class="poster-card"><span class="poster-label">peli 23</span></div>
      <div class="poster-card"><span class="poster-label">peli 24</span></div>
    </div></div>
    <button class="nav-arrow nav-arrow-left" aria-label="Anterior">&#8249;</button>
    <button class="nav-arrow nav-arrow-right" aria-label="Siguiente">&#8250;</button>
    <div class="circle-area" id="circleArea">
      <div class="submenu-container"><div class="submenu-overlay" id="submenuPanel"></div></div>
      <div class="circle-border"></div>
      <svg class="menu-ring-svg" id="menuSvg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <path id="tp" d="M 300,300 m -270,0 a 270,270 0 1,1 540,0 a 270,270 0 1,1 -540,0" fill="none"/>
        </defs>
        <g id="mg">
          <text><textPath href="#tp" startOffset="2%" class="menu-text" data-menu="películas" data-i="0">películas</textPath></text>
          <text><textPath href="#tp" startOffset="18%" class="menu-text" data-menu="contacto" data-i="1">contacto</textPath></text>
          <text><textPath href="#tp" startOffset="35%" class="menu-text" data-menu="trabajos" data-i="2">trabajos</textPath></text>
          <text><textPath href="#tp" startOffset="53%" class="menu-text" data-menu="sobre mí" data-i="3">sobre mí</textPath></text>
          <text><textPath href="#tp" startOffset="70%" class="menu-text" data-menu="proceso" data-i="4">galardones</textPath></text>
        </g>
      </svg>
      <div class="ba-viewer">
        <div class="ba-slide active"><div class="ba-placeholder"><div class="ba-label">antes</div><div class="ba-title">Espacio Original</div>
          <svg width="44" height="44" viewBox="0 0 60 60" style="margin-top:8px;opacity:.18"><rect x="5" y="15" width="50" height="35" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="5" y1="40" x2="25" y2="25" stroke="currentColor" stroke-width="1"/><circle cx="42" cy="22" r="5" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        </div></div>
        <div class="ba-slide"><div class="ba-placeholder"><div class="ba-label">después</div><div class="ba-title">Espacio Transformado</div>
          <svg width="44" height="44" viewBox="0 0 60 60" style="margin-top:8px;opacity:.18"><rect x="5" y="15" width="50" height="35" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="10" y="20" width="18" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1"/><rect x="32" y="30" width="18" height="15" rx="2" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        </div></div>
      </div>
    </div>
  </div>
<script>
const MENU_DATA = {
  'películas': { items: [{label:'peli 1',url:'#'},{label:'peli 2',url:'#'},{label:'peli 3',url:'#'},{label:'peli 4',url:'#'}] },
  'contacto':  { items: [{label:'email',url:'#'},{label:'instagram',url:'#'},{label:'imdb',url:'#'}] },
  'trabajos':  { items: [{label:'largometrajes',url:'#'},{label:'series',url:'#'},{label:'publicidad',url:'#'}] },
  'sobre mí':  { items: [{label:'biografía',url:'#'},{label:'premios',url:'#'},{label:'cv',url:'#'}] },
  'galardones':   { items: [{label:'cómo trabajo',url:'#'},{label:'bocetos',url:'#'},{label:'maquetas',url:'#'}] }
};
const OFFSETS = [2, 18, 35, 53, 70];
const TOP_POS = 75;

// Loader
setTimeout(() => document.getElementById('loader').classList.add('hidden'), 900);

// Poster strips — duplicate for infinite loop
document.querySelectorAll('.poster-strip').forEach(s => { s.innerHTML += s.innerHTML; });

// Flip text
const flipEl = document.getElementById('flipText');
const headerName = document.getElementById('headerName');
const origN = 'idoia esteban', altN = 'diseño de producción';
const abc = 'abcdefghijklmnñopqrstuvwxyzáéíóú';
let isAlt = false, flipBusy = false;

function wrapC(t) {
  flipEl.innerHTML = '';
  for (const c of t) { const s = document.createElement('span'); s.className='char'; s.textContent = c===' '?'\u00A0':c; flipEl.appendChild(s); }
}
wrapC(origN);

function flipTo(target, cb) {
  const mx = Math.max(flipEl.children.length, target.length);
  while (flipEl.children.length < mx) { const s=document.createElement('span');s.className='char';s.textContent='\u00A0';flipEl.appendChild(s); }
  let dn=0;
  flipEl.querySelectorAll('.char').forEach((el,i) => {
    const tc = i<target.length?target[i]:'';
    const dl = i*38+Math.random()*50, sc=3+Math.floor(Math.random()*3);
    setTimeout(()=>{let c=0;const iv=setInterval(()=>{if(c<sc){el.textContent=abc[Math.floor(Math.random()*abc.length)];el.classList.add('flipping');c++}else{el.textContent=tc===' '?'\u00A0':tc;el.classList.remove('flipping');clearInterval(iv);dn++;if(dn>=mx){while(flipEl.children.length>target.length)flipEl.removeChild(flipEl.lastChild);if(cb)cb()}}},50)},dl);
  });
}
headerName.addEventListener('mouseenter', () => {
  if(flipBusy)return; flipBusy=true;
  flipTo(isAlt?origN:altN, ()=>{isAlt=!isAlt;flipBusy=false});
});

// Before/After
const bas = document.querySelectorAll('.ba-slide'); let cba=0;
setInterval(()=>{bas[cba].classList.remove('active');cba=(cba+1)%bas.length;bas[cba].classList.add('active')},3000);

// Circular menu
const mg = document.getElementById('mg');
const mts = document.querySelectorAll('.menu-text');
const sp = document.getElementById('submenuPanel');
let activeM = null, curAng = 0, spinning = true;

// Hover: inverted rectangle effect
mts.forEach(t => {
  t.addEventListener('mouseenter', () => {
    if(t.classList.contains('active'))return;
    t.style.fill='var(--color-white)';
    t.style.paintOrder='stroke';
    t.style.stroke='var(--color-primary)';
    t.style.strokeWidth='9px';
    t.style.strokeLinejoin='round';
  });
  t.addEventListener('mouseleave', () => {
    if(t.classList.contains('active'))return;
    resetStyle(t);
  });
});

function resetStyle(t){t.style.fill='';t.style.paintOrder='';t.style.stroke='';t.style.strokeWidth='';t.style.strokeLinejoin=''}
function setActive(t){t.style.fill='var(--color-white)';t.style.paintOrder='stroke';t.style.stroke='var(--color-primary)';t.style.strokeWidth='9px';t.style.strokeLinejoin='round'}

// Spin
function spin(){
  if(spinning){curAng=(curAng+0.08)%360;mg.setAttribute('transform',`rotate(${curAng},300,300)`)}
  requestAnimationFrame(spin);
}
requestAnimationFrame(spin);

// Smooth animated rotation
function animRot(from,to,dur,cb){
  const st=performance.now();
  (function step(now){
    const t=Math.min((now-st)/dur,1);
    const e=1-Math.pow(1-t,3);
    mg.setAttribute('transform',`rotate(${from+(to-from)*e},300,300)`);
    t<1?requestAnimationFrame(step):cb&&cb();
  })(performance.now());
}

// Click handler
mts.forEach((t,idx)=>{
  t.addEventListener('click',e=>{
    e.stopPropagation();
    const mk=t.getAttribute('data-menu');
    if(activeM===mk){closeMenu();return}

    spinning=false;

    // Calculate target
    const offPct=OFFSETS[idx];
    const targetDeg=((TOP_POS-offPct)/100)*360;
    let delta=targetDeg-curAng;
    while(delta>180)delta-=360;
    while(delta<-180)delta+=360;
    const final=curAng+delta;

    // Animate
    animRot(curAng,final,900,()=>{
      curAng=final%360; if(curAng<0)curAng+=360;
      mts.forEach(x=>{x.classList.remove('active');resetStyle(x)});
      t.classList.add('active'); setActive(t);
      activeM=mk;
      const d=MENU_DATA[mk];
      if(d){sp.innerHTML=d.items.map(it=>`<a href="${it.url}">${it.label}</a>`).join('');requestAnimationFrame(()=>sp.classList.add('open'))}
    });
  });
});

function closeMenu(){
  sp.classList.remove('open');
  mts.forEach(x=>{x.classList.remove('active');resetStyle(x)});
  activeM=null;
  setTimeout(()=>{spinning=true},300);
}

document.addEventListener('click',e=>{
  if(activeM&&!e.target.closest('.menu-text')&&!e.target.closest('.submenu-overlay'))closeMenu();
});
</script>
</body>
</html>
